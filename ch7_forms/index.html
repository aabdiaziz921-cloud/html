<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soldier Registration Form</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<form>

<h2>Soldier Registration Form</h2>

<!-- Personal Details -->
<fieldset>

<legend>Personal Details</legend>

<label for="firstname">First Name</label>
<input type="text" id="firstname" name="firstname" placeholder="Enter first name" required>

<label for="lastname">Last Name</label>
<input type="text" id="lastname" name="lastname" placeholder="Enter last name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Enter email address">

<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone" placeholder="+254">

<label for="dob">Date of Birth</label>
<input type="date" id="dob" name="dob">

<label for="age">Age</label>
<input type="number" id="age" name="age" min="18" max="60">

<label for="photo">Upload Profile Photo</label>
<input type="file" id="photo" name="photo">

<label>Gender</label>

<label>
<input type="radio" name="gender" value="male"> Male
</label>

<label>
<input type="radio" name="gender" value="female"> Female
</label>

<label>
<input type="radio" name="gender" value="other"> Other
</label>

</fieldset>


<!-- Military Information -->
<fieldset>

<legend>Military Information</legend>

<label for="rank">Rank</label>

<select id="rank" name="rank">

<option>Private</option>
<option>Corporal</option>
<option>Sergeant</option>
<option>Lieutenant</option>
<option>Captain</option>
<option>Major</option>

</select>

<label for="idnumber">Military ID Number</label>
<input type="text" id="idnumber" name="idnumber">

<label for="experience">Years of Service</label>
<input type="number" id="experience" name="experience">

<label>Special Skills</label>

<label><input type="checkbox" name="skills"> Sniper</label>
<label><input type="checkbox" name="skills"> Medic</label>
<label><input type="checkbox" name="skills"> Engineer</label>
<label><input type="checkbox" name="skills"> Communications</label>

<label for="readiness">Mission Readiness</label>
<input type="range" id="readiness" min="0" max="100">

</fieldset>


<!-- Equipment Section -->
<fieldset>

<legend>Equipment Assignment</legend>

<label><input type="checkbox"> Rifle</label>
<label><input type="checkbox"> Pistol</label>
<label><input type="checkbox"> Grenades</label>
<label><input type="checkbox"> Helmet</label>
<label><input type="checkbox"> Body Armor</label>
<label><input type="checkbox"> Radio</label>

<label for="equipmentNotes">Equipment Notes</label>

<textarea id="equipmentNotes" rows="4" placeholder="Write equipment details here"></textarea>

</fieldset>


<!-- Buttons -->

<button type="submit">Register Soldier</button>

<button type="reset">Clear Form</button>

</form>

</body>
</html>
